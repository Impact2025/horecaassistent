<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TafelAI - Welkom</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "background": "#fbf9f6",
          "surface-container-low": "#f5f3f0",
          "on-surface": "#1b1c1a", "on-surface-variant": "#404943",
          "outline": "#707973", "outline-variant": "#c0c9c1",
          "primary": "#003422", "on-primary": "#ffffff",
          "primary-fixed": "#b4f0d0", "primary-fixed-dim": "#99d3b4",
          "secondary-container": "#d6e7db",
          "on-secondary-container": "#59685f",
          "tertiary": "#501d00", "on-tertiary": "#ffffff",
          "tertiary-fixed": "#ffdbcc",
        },
        fontFamily: {
          "headline": ["Manrope", "sans-serif"],
          "serif": ["Cormorant Garamond", "Georgia", "serif"],
          "body": ["Inter", "sans-serif"],
          "label": ["Inter", "sans-serif"],
        },
        borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1rem", "2xl": "1.5rem", "full": "9999px" },
      },
    },
  }
</script>
<style>
  body { background: #fbf9f6; color: #1b1c1a; -webkit-font-smoothing: antialiased; }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    display: inline-block; line-height: 1;
  }
  @keyframes scanLine {
    0%   { top: 16px; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: calc(100% - 16px); opacity: 0; }
  }
  @keyframes pulse-ring {
    0%   { transform: scale(0.95); opacity: 0.6; }
    50%  { transform: scale(1.05); opacity: 0.2; }
    100% { transform: scale(0.95); opacity: 0.6; }
  }
  .scan-line {
    position: absolute; left: 20px; right: 20px; height: 1.5px;
    background: linear-gradient(90deg, transparent, #003422 20%, #003422 80%, transparent);
    animation: scanLine 3s ease-in-out infinite;
    box-shadow: 0 0 12px rgba(0,52,34,0.4);
  }
  .pulse-ring {
    animation: pulse-ring 3s ease-in-out infinite;
  }
  .bracket {
    position: absolute; width: 24px; height: 24px;
    border-color: rgba(0,52,34,0.5);
    border-style: solid;
  }
  .bracket-tl { top: 0; left: 0; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .bracket-tr { top: 0; right: 0; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
  .bracket-bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
  .bracket-br { bottom: 0; right: 0; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }
  .noise {
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  }
</style>
<style>body { min-height: max(884px, 100dvh); }</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between selection:bg-primary-fixed-dim noise">

<!-- Top -->
<header class="w-full pt-14 px-8 flex flex-col items-center text-center">
  <div class="flex items-center gap-2 mb-6 opacity-40">
    <span class="material-symbols-outlined text-primary" style="font-size:14px;">qr_code_scanner</span>
    <span class="font-label text-[10px] tracking-[0.35em] uppercase font-semibold text-on-surface-variant">TafelAI</span>
  </div>
  <p class="font-label text-[10px] tracking-[0.25em] text-outline uppercase font-medium mb-3">Welkom bij</p>
  <h1 class="font-serif text-6xl font-light tracking-tight text-primary leading-none">
    The Botanist
  </h1>
  <div class="flex items-center gap-3 mt-4">
    <div class="h-px w-10 bg-primary/15"></div>
    <span class="text-[10px] font-label text-outline uppercase tracking-[0.2em]">Fine Dining</span>
    <div class="h-px w-10 bg-primary/15"></div>
  </div>
</header>

<!-- Scan Area -->
<main class="flex-grow flex flex-col items-center justify-center w-full px-8">
  <div class="relative w-64 h-64 flex items-center justify-center">
    <!-- Ambient glow -->
    <div class="absolute inset-4 rounded-full bg-primary-fixed/20 blur-[60px] pulse-ring"></div>
    <!-- Corner brackets -->
    <div class="bracket bracket-tl"></div>
    <div class="bracket bracket-tr"></div>
    <div class="bracket bracket-bl"></div>
    <div class="bracket bracket-br"></div>
    <!-- Scan line -->
    <div class="scan-line"></div>
    <!-- Icon -->
    <div class="flex flex-col items-center gap-3 z-10 relative">
      <span class="material-symbols-outlined text-primary opacity-70" style="font-size:52px;font-variation-settings:'wght' 100,'FILL' 0,'GRAD' 0,'opsz' 48;">
        qr_code_2
      </span>
      <p class="font-body text-[11px] text-on-surface-variant/60 tracking-wider">Klaar om te verbinden</p>
    </div>
  </div>

  <!-- Tafel indicator -->
  <div class="mt-10 flex items-center gap-2.5 px-5 py-2.5 bg-surface-container-low rounded-full border border-outline-variant/30">
    <span class="material-symbols-outlined text-primary" style="font-size:16px;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20;">table_restaurant</span>
    <span class="text-[11px] font-semibold text-on-surface-variant">Scan de tafelcode om te beginnen</span>
  </div>
</main>

<!-- Action -->
<footer class="w-full pb-14 px-8 flex flex-col items-center gap-6">
  <button class="relative overflow-hidden flex items-center justify-center gap-3 bg-gradient-to-br from-tertiary to-[#3a1400] text-on-tertiary px-10 py-5 rounded-full shadow-xl shadow-tertiary/20 active:scale-[0.98] transition-all duration-300 w-full max-w-xs group">
    <!-- Shimmer -->
    <div class="absolute inset-0 -translate-x-full group-hover:translate-x-full transition-transform duration-700 bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
    <span class="material-symbols-outlined text-on-tertiary" style="font-size:20px;font-variation-settings:'wght' 300,'FILL' 0,'GRAD' 0,'opsz' 24;">qr_code_scanner</span>
    <span class="font-headline font-semibold text-base tracking-widest uppercase">Scan om te bestellen</span>
  </button>

  <div class="flex flex-col items-center gap-2">
    <div class="flex items-center gap-1.5 opacity-30">
      <span class="font-label text-[9px] tracking-widest uppercase text-on-surface-variant">Powered by</span>
      <span class="font-headline text-[10px] font-bold text-on-surface-variant">TafelAI</span>
    </div>
    <div class="flex gap-5 mt-1">
      <span class="material-symbols-outlined text-primary/25" style="font-size:14px;">wifi</span>
      <span class="material-symbols-outlined text-primary/25" style="font-size:14px;">language</span>
      <span class="material-symbols-outlined text-primary/25" style="font-size:14px;">auto_awesome</span>
    </div>
  </div>
</footer>

</body>
</html>
