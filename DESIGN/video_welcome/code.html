<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;700;800&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          "primary": "#003422", "on-primary": "#ffffff",
          "primary-fixed": "#b4f0d0", "primary-fixed-dim": "#99d3b4",
          "on-primary-fixed": "#002114",
          "surface-container-lowest": "#ffffff",
          "tertiary": "#501d00", "on-tertiary": "#ffffff",
          "tertiary-fixed": "#ffdbcc",
          "on-surface-variant": "#404943",
          "outline-variant": "#c0c9c1",
        },
        fontFamily: {
          "headline": ["Manrope", "sans-serif"],
          "serif": ["Cormorant Garamond", "Georgia", "serif"],
          "body": ["Inter", "sans-serif"],
          "label": ["Inter", "sans-serif"],
        },
        borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1rem", "2xl": "1.5rem", "full": "9999px" },
      },
    },
  }
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    display: inline-block; line-height: 1;
  }
  body { -webkit-font-smoothing: antialiased; overflow: hidden; }
  .video-scrim {
    background: linear-gradient(
      to bottom,
      rgba(0,26,16,0.3) 0%,
      rgba(0,26,16,0.1) 40%,
      rgba(0,26,16,0.65) 75%,
      rgba(0,26,16,0.88) 100%
    );
  }
  .blur-glass {
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up-1 { animation: fadeUp 0.7s ease forwards; }
  .fade-up-2 { animation: fadeUp 0.7s ease 0.15s forwards; opacity: 0; }
  .fade-up-3 { animation: fadeUp 0.7s ease 0.3s forwards; opacity: 0; }
</style>
<style>body { min-height: max(884px, 100dvh); }</style>
</head>
<body class="font-body overflow-hidden">

<div class="relative h-screen w-full flex flex-col overflow-hidden">
  <!-- Background image -->
  <div class="absolute inset-0 z-0">
    <img class="h-full w-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCScA2Lzi0w4rIV-mcB3WMa9oUxSoXgYU13oaIzLbxLvVD5GfeIkXz_eGWinleAclDD4IvtgbTiYmKVrhAlJ5T9CC_bqI17jOtcqUhbf0CryPZoV3-YiPvQIyEjud2CjJhJxXuIa34CaZjxOWJ8OD1LCSf6c-89yb0iJ84kfxsc1IxiArZKHkSSY84srLbPRdDotAz3JhuWKiUce6KsQCMFORVp2PmZ-dw6wUaiI8qB0xyqzGvKIILqp1wMfcsCwLqX2gGJsUZJJ6o" alt="Kitchen"/>
    <div class="absolute inset-0 video-scrim z-10"></div>
  </div>

  <!-- Top branding -->
  <div class="absolute top-10 w-full z-20 flex flex-col items-center fade-up-1">
    <div class="p-3 rounded-full blur-glass bg-white/8 border border-white/10 mb-2">
      <span class="material-symbols-outlined text-white" style="font-size:22px;">qr_code_scanner</span>
    </div>
    <p class="font-label text-white/40 tracking-[0.35em] text-[9px] uppercase font-bold">TafelAI</p>
  </div>

  <!-- Central content -->
  <div class="relative z-20 flex flex-col items-center justify-center flex-1 px-8">
    <!-- Chef avatar -->
    <div class="w-20 h-20 rounded-full overflow-hidden border-2 border-white/20 mb-8 shadow-2xl fade-up-1">
      <img class="w-full h-full object-cover rounded-full" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCm3L7GZIfeDQs7lBuxvUco8E-XlNNx4rPFhAyRgE0-AFieBf37ETfIL85a92jPwXRczRyeWTD4As9y2yk7om_GZc1bnJw6UJo4NQytmOmUC6q2tSSAgvD8FeUXRABb2OsUb_FIj2w17i-ERt0wa_D8e_EyS30HrjFT8gBLR3SsV60WLjncSxjvrEJTO5pFLo5DkSGb24gPwhCKUxn7Uz82RBr5JjdOULHiXEPjnvldYi8uMtQzQ1PBipLk2cZlzO9k2VcrjcJ_XDA" alt="Chef"/>
    </div>
    <div class="text-center fade-up-2">
      <p class="font-label text-white/50 text-[10px] uppercase tracking-[0.25em] mb-3">Welkom bij</p>
      <h1 class="font-serif text-5xl text-white font-light leading-tight text-center">
        Welkom bij de<br/>
        <em class="text-primary-fixed not-italic" style="font-style:italic;">Culinaire Reis</em>
      </h1>
    </div>
  </div>

  <!-- Bottom card -->
  <div class="absolute bottom-10 w-full px-5 z-30 fade-up-3">
    <div class="bg-white/10 blur-glass rounded-2xl px-5 py-4 border border-white/15 shadow-2xl flex items-center justify-between">
      <div>
        <p class="font-label text-white/40 text-[9px] uppercase tracking-widest font-bold mb-1">Op dit moment</p>
        <div class="flex items-center gap-2">
          <span class="material-symbols-outlined text-primary-fixed" style="font-size:16px;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 20;">restaurant</span>
          <span class="font-headline text-white font-bold text-lg tracking-tight">L'Essence Paris</span>
        </div>
      </div>
      <button class="flex items-center gap-2 bg-tertiary/90 hover:bg-tertiary transition-colors px-5 py-2.5 rounded-full group">
        <span class="text-on-tertiary font-headline font-bold text-sm">Overslaan</span>
        <span class="material-symbols-outlined text-on-tertiary group-hover:translate-x-0.5 transition-transform" style="font-size:14px;">arrow_forward_ios</span>
      </button>
    </div>
    <div class="flex justify-center gap-1.5 mt-5">
      <div class="w-8 h-1 bg-primary-fixed rounded-full"></div>
      <div class="w-1.5 h-1 bg-white/20 rounded-full"></div>
      <div class="w-1.5 h-1 bg-white/20 rounded-full"></div>
    </div>
  </div>

  <!-- Grain texture overlay -->
  <div class="absolute inset-0 pointer-events-none z-15 opacity-[0.06]" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 256 256%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noise%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noise)%22 opacity=%221%22/%3E%3C/svg%3E');"></div>
</div>

</body>
</html>
